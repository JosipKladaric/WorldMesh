<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sojourner 3D: Peer Mesh</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
    
    <!-- External Libraries (Zero Building Steps) -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="game-app">
        <!-- Top System HUD (Outside 3D Viewport) -->
        <header id="game-hud" class="glass-bar hidden">
            <div class="stats-left">
                <div class="stat-badge"><span class="label">PEER:</span> <span id="peer-id">...</span></div>
                <div class="stat-badge"><span class="label">PEERS:</span> <span id="peer-count">0</span></div>
            </div>
            <div class="controls-right">
                <button id="share-btn" class="glass-btn primary">INVITE PLAYER</button>
            </div>
        </header>

        <!-- Main Viewport Area -->
        <main id="game-viewport">
            <div id="join-screen" class="glass-panel">
                <h1 class="logo">SOJOURNER 3D</h1>
                <p class="tagline">Mesh-Networked Procedural Realm</p>
                <div class="name-entry">
                    <input type="text" id="player-name" placeholder="ENTER CALLSIGN..." maxlength="12">
                </div>
                <div class="controls-hint">WASD to Move | MOUSE to Look</div>
                <button id="enter-btn">ENTER SHARED WORLD</button>
            </div>
            
            <div id="p2p-log">
                <div class="log-entry">Searching for mesh network...</div>
            </div>
        </main>
    </div>
    
    <!-- Entry Script -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
